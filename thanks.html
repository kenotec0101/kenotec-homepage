<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의가 접수되었습니다 | 주식회사 케노텍</title>
  <meta name="description" content="주식회사 케노텍 문의가 정상적으로 접수되었습니다." />
  <style>
    :root {
      --navy: #0f172a;
      --blue: #0a5cff;
      --text: #18253a;
      --muted: #607089;
      --bg: #f4f8fd;
      --card: rgba(255,255,255,0.92);
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(92,188,255,0.18), transparent 28%),
        linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 720px);
      padding: 40px 32px;
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      text-align: center;
    }
    h1 {
      margin: 0 0 14px;
      color: var(--navy);
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
      letter-spacing: -0.04em;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.7;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
    }
    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--blue) 0%, #0b46cf 100%);
    }
    .btn-secondary {
      color: var(--navy);
      background: #fff;
      border: 1px solid rgba(15,23,42,0.08);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>문의가 접수되었습니다</h1>
    <p>
      입력해주신 내용을 확인한 뒤 검토 후 회신드리겠습니다.<br />
      추가 문의가 필요하신 경우 kenotec@kenotec.kr 로 직접 연락하실 수 있습니다.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="https://www.kenotec.kr/">홈으로 돌아가기</a>
      <a class="btn btn-secondary" href="mailto:kenotec@kenotec.kr">직접 이메일 보내기</a>
    </div>
  </main>
</body>
</html>
